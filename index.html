<!DOCTYPE html>
<html>
<head>
<title>AI Academic Advisor</title>
</head>
<body>

<h1>AI Academic Advisor</h1>

<input type="text" id="question" placeholder="Ask a question">

<button onclick="askAI()">
Ask AI
</button>

<p id="answer"></p>

<script>

function askAI(){

let question =
document.getElementById("question")
.value.toLowerCase();

let answer="";

if(question.includes("machine learning"))
{
answer=
"Machine Learning requires Data Structures, Statistics and CGPA above 7.5";
}

else if(question.includes("cyber security"))
{
answer=
"Cyber Security path includes Networking, Ethical Hacking and Security Analysis";
}

else if(question.includes("career"))
{
answer=
"Based on your profile I recommend AI Engineer, Data Scientist and ML Researcher";
}

else
{
answer=
"I am still learning. Please ask academic-related questions.";
}

document.getElementById("answer").innerHTML=answer;

}

</script>

</body>
</html>
